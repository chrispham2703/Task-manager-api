name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  security-events: write

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build, test, and generate coverage
        run: mvn -B clean verify

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: OWASP Dependency-Check
        run: |
          mvn -B org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=11 \
            -Dformats=HTML,JSON

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.*
          retention-days: 14

  docker-build:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t task-manager-api:ci .

      - name: Verify image exists
        run: docker image inspect task-manager-api:ci

  api-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for app health
        run: |
          set -e
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/actuator/health >/dev/null; then
              echo "App is healthy"
              exit 0
            fi
            echo "Attempt $i/60: not ready yet"
            sleep 5
          done
          echo "--- app logs ---"
          docker compose logs app
          echo "--- db logs ---"
          docker compose logs db
          exit 1

      - name: Run Postman collection (Newman)
        run: |
          newman run postman/Task-Manager-API.postman_collection.json \
            -e postman/Task-Manager-API.postman_environment.json \
            --delay-request 200

      - name: Stop stack
        if: always()
        run: docker compose down -v
