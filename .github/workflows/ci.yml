name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run unit tests
        run: ./mvnw test -Dspring.profiles.active=test

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Docker Compose
        run: docker compose up -d --build

      - name: Show running containers
        run: docker compose ps

      - name: Wait for app to be ready
        run: |
          echo "Waiting for app..."
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health > /dev/null; then
              echo "App is healthy."
              exit 0
            fi
            echo "App not ready yet. Retrying in 5 seconds..."
            sleep 1010
          done
          echo "App failed to become healthy in time."
          docker compose logs
          exit 1

      - name: Get Docker network name
        run: |
          echo "NETWORK=$(docker network ls | grep task-manager | awk '{print $2}')" >> $GITHUB_ENV

      - name: Run Newman tests
        run: |
          docker run --rm \
            --network ${{ env.NETWORK }} \
            -v "${{ github.workspace }}/postman:/etc/newman" \
            postman/newman:latest \
            run "/etc/newman/Task-Manager-API.postman_collection.json" \
            --environment "/etc/newman/Task-Manager-API-Docker.postman_environment.json" \
            --delay-request 200

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit-tests]      

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t task-manager-api:ci .

      - name: Verify image exists
        run: docker images task-manager-api:ci