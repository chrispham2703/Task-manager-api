name: CI
# CI workflow for build and test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '2121'
        cache: 'maven'
        
    - name: Build with Maven
      run: mvn clean compile
      
    - name: Run tests
      run: mvn test
